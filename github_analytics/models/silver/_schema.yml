version: 2

models:
  - name: stg_repositories
    columns:
      - name: repo_id
        tests:
          - unique
          - not_null

  - name: stg_pull_requests
    columns:
      - name: pr_number
        tests:
          - unique
          - not_null
      - name: repo_id
        tests:
          - not_null

  - name: stg_issues
    columns:
      - name: issue_number
        tests:
          - unique
          - not_null

  - name: stg_commits
    columns:
      - name: commit_sha
        tests:
          - unique
          - not_null
      - name: day_of_week
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2, 3, 4, 5, 6]
